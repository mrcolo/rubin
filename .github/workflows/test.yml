name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run test suite
        run: python -m unittest discover -s tests -v
      - name: Compose and verify the demo
        run: |
          python server.py --demo --write-only demo_ci.mid
          python server.py --verify demo_ci.mid
